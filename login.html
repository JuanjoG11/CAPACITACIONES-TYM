<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar | Capacitaciones TYM &amp; TAT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/login.css">
</head>
<body>
    <!-- LOGIN TAT -->
    <form id="login-tat" class="login-form">
        <figure>
            <img class="logo-tat" src="IMG/TAT-logo_RGB-10.png">
        </figure>
        <fieldset class="login-fieldset">
            <legend class="login-legend">Login TAT</legend>

            <label for="nombre1" class="login-label">Nombre Completo: </label>
            <input type="text" id="nombre1" class="login-input" placeholder="Ingrese su Nombre Completo">

            <label for="tipo_doc1" class="login-label">Tipo de Documento: </label>
            <select id="tipo_doc1" class="login-select">
                <option value="">Seleccione...</option>
                <option value="CC">Cédula de Ciudadanía</option>
                <option value="TI">Tarjeta de Identidad</option>
                <option value="CE">Cédula de Extranjería...</option>
            </select>

            <label for="num_doc1" class="login-label">Número de Documento: </label>
            <input type="text" id="num_doc1" class="login-input" placeholder="Ingrese su Número de Documento" inputmode="numeric">

            <label for="cargo1" class="login-label">Cargo: </label>
            <select id="cargo1" class="login-select">
                <option value="">Seleccione...</option>
                <option value="aux_log">Auxiliar Logístico</option>
                <option value="aux_sep">Auxiliar de Separación</option>
                <option value="aux_bod">Auxiliar de Bodega</option>
                <option value="jefe_bod">Líder de Bodega</option>
            </select>

            <footer>
                <button class="login-button">Iniciar Sesión</button>
            </footer>
        </fieldset>
    </form>

    <!-- LOGIN TYM  -->
     <form id="login-tym" class="login-form">
        <figure>
            <img class="logo-tym" src="IMG/tym-img.jpg">
        </figure>
        <fieldset class="login-fieldset">
            <legend class="login-legend">Login TYM </legend>

            <label for="nombre2" class="login-label"> Nombre Completo: </label>
            <input type="text" id="nombre2" class="login-input" placeholder="Ingrese su Nombre Completo">

            <label for="tipo_doc2" class="login-label">Tipo de Documento: </label>
            <select id="tipo_doc2" class="login-select">
                <option value="">Seleccione...</option>
                <option value="CC">Cédula de Ciudadanía</option>
                <option value="TI">Tarjeta de Identidad</option>
                <option value="CE">Cédula de Extranjería</option>
            </select>

            <label for="num_doc2" class="login-label"> Número de Documento: </label>
            <input type="text" id="num_doc2" class="login-input" placeholder="Ingrese su Número de Documento" inputmode="numeric">

            <label for="cargo2" class="login-label">Cargo: </label>
            <select id="cargo2" class="login-select">
                <option value="">Seleccione...</option>
                <option value="aux_log">Auxiliar Logístico</option>
                <option value="aux_sep">Auxiliar de Separación</option>
                <option value="aux_bod">Auxiliar de Bodega</option>
                <option value="jefe_bod">Líder de bodega</option>
            </select>

            <footer>
                <button class="login-button"> Iniciar Sesión</button>
            </footer>
        </fieldset>
    </form>

<script>
    // Lógica simple que funciona siempre (incluso sin servidor)
    (function() {
        const area = (new URLSearchParams(window.location.search).get('area') || '').toLowerCase().trim();
        const fTat = document.getElementById('login-tat');
        const fTym = document.getElementById('login-tym');
        if (area === 'tat') {
            if (fTym) fTym.style.display = 'none';
            if (fTat) fTat.style.display = 'flex';
        } else if (area === 'tym') {
            if (fTat) fTat.style.display = 'none';
            if (fTym) fTym.style.display = 'flex';
        }
    })();
</script>
<script type="module" src="controllers/login.js"></script>
</body>
</html>
