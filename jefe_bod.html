<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inducción | Líder de Bodega</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/induction_master.css">
</head>
<body>

<main class="ind-modulo">
    <header class="ind-modulo__header">
        <h1>Inducción: <span>Líder de Bodega</span></h1>
        <p>Revision de gestión administrativa y operativa. Al finalizar podrás evaluarte.</p>
    </header>

    <section class="ind-carousel">
        <div class="ind-carousel__slides">
            <figure class="ind-slide active">
                <img src="IMG/IMG_JEFE-BOD/1.png" alt="Slide 1">
                <figcaption>Responsabilidades del Cargo</figcaption>
            </figure>
            <figure class="ind-slide">
                <img src="IMG/IMG_JEFE-BOD/2.png" alt="Slide 2">
                <figcaption>Dirección y Supervisión de Bodega</figcaption>
            </figure>
            <figure class="ind-slide">
                <img src="IMG/IMG_JEFE-BOD/3.png" alt="Slide 3">
                <figcaption>Coordinación de Despachos y Rutas</figcaption>
            </figure>
            <figure class="ind-slide">
                <img src="IMG/IMG_JEFE-BOD/4.png" alt="Slide 4">
                <figcaption>Gestión de Proveedores</figcaption>
            </figure>
            <figure class="ind-slide">
                <img src="IMG/IMG_JEFE-BOD/5.png" alt="Slide 5">
                <figcaption>Gestión de Stock y Rotación</figcaption>
            </figure>
            <figure class="ind-slide">
                <img src="IMG/IMG_JEFE-BOD/6.png" alt="Slide 6">
                <figcaption>Indicadores, Informes y Reportes</figcaption>
            </figure>
            <figure class="ind-slide">
                <img src="IMG/IMG_JEFE-BOD/7.png" alt="Slide 7">
                <figcaption>Cierres de Mes e Inventario</figcaption>
            </figure>
            <figure class="ind-slide">
                <img src="IMG/IMG_JEFE-BOD/8.png" alt="Slide 8">
                <figcaption>Responsabilidades Críticas</figcaption>
            </figure>
            <figure class="ind-slide">
                <img src="IMG/IMG_JEFE-BOD/9.png" alt="Slide 9">
                <figcaption>Normas y Contactos</figcaption>
            </figure>
        </div>

        <nav class="ind-carousel__controls">
            <button id="ind-prev" class="ind-btn-control">Anterior</button>
            <span id="ind-contador" class="ind-contador">1 / 9</span>
            <button id="ind-next" class="ind-btn-control">Siguiente</button>
        </nav>
    </section>

    <section class="ind-evaluacion">
        <button id="ind-btnEvaluacion" class="ind-btn-eval" disabled>
            Iniciar Evaluación →
        </button>
    </section>
</main>

<script src="controllers/aux_log.js"></script>
</body>
</html>
