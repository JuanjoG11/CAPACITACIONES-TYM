<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inducción | Auxiliar de Separación</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/induction_master.css">
</head>
<body>

<main class="ind-modulo">
    <header class="ind-modulo__header">
        <h1>Inducción: <span>Auxiliar de Separación</span></h1>
        <p>Aprende sobre tus responsabilidades y procesos. Al finalizar podrás evaluarte.</p>
    </header>

    <section class="ind-carousel">
        <div class="ind-carousel__slides">
            <figure class="ind-slide active">
                <img src="IMG/IMG_AUX-SEP/1.png" alt="Slide 1">
                <figcaption>Responsabilidades del Cargo</figcaption>
            </figure>
            <figure class="ind-slide">
                <img src="IMG/IMG_AUX-SEP/2.png" alt="Slide 2">
                <figcaption>Funciones de 1er Nivel</figcaption>
            </figure>
            <figure class="ind-slide">
                <img src="IMG/IMG_AUX-SEP/3.png" alt="Slide 3">
                <figcaption>Procesos del Auxiliar de Separación</figcaption>
            </figure>
            <figure class="ind-slide">
                <img src="IMG/IMG_AUX-SEP/4.png" alt="Slide 4">
                <figcaption>Responsabilidades y Equipos</figcaption>
            </figure>
            <figure class="ind-slide">
                <img src="IMG/IMG_AUX-SEP/5.png" alt="Slide 5">
                <figcaption>Contacto Interno y Externo</figcaption>
            </figure>
            <figure class="ind-slide">
                <img src="IMG/IMG_AUX-SEP/6.png" alt="Slide 6">
                <figcaption>Normas de Conducta y Presentación</figcaption>
            </figure>
            <figure class="ind-slide">
                <img src="IMG/IMG_AUX-SEP/7.png" alt="Slide 7">
                <figcaption>Deberes del Auxiliar de Separación</figcaption>
            </figure>
            <figure class="ind-slide">
                <img src="IMG/IMG_AUX-SEP/8.png" alt="Slide 8">
                <figcaption>Horarios</figcaption>
            </figure>
            <figure class="ind-slide">
                <img src="IMG/IMG_AUX-SEP/9.png" alt="Slide 9">
                <figcaption>Organización y Preparación</figcaption>
            </figure>
        </div>

        <nav class="ind-carousel__controls">
            <button id="ind-prev" class="ind-btn-control">Anterior</button>
            <span id="ind-contador" class="ind-contador">1 / 9</span>
            <button id="ind-next" class="ind-btn-control">Siguiente</button>
        </nav>
    </section>

    <section class="ind-evaluacion">
        <button id="ind-btnEvaluacion" class="ind-btn-eval" disabled>
            Iniciar Evaluación →
        </button>
    </section>
</main>

<script src="controllers/aux_log.js"></script>
</body>
</html>
