<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inducción | Auxiliar Logístico</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/induction_master.css">
</head>
<body>

<main class="ind-modulo">
    <header class="ind-modulo__header">
        <h1>Inducción: <span>Auxiliar Logístico</span></h1>
        <p>Revisa cada diapositiva. Al llegar al final, podrás iniciar tu evaluación.</p>
    </header>

    <section class="ind-carousel">
        <div class="ind-carousel__slides">
            <figure class="ind-slide active">
                <img src="IMG/IMG_AUX-LOG/1.png" alt="Slide 1">
                <figcaption>Responsabilidades del Cargo</figcaption>
            </figure>
            <figure class="ind-slide">
                <img src="IMG/IMG_AUX-LOG/2.png" alt="Slide 2">
                <figcaption>Funciones Generales</figcaption>
            </figure>
            <figure class="ind-slide">
                <img src="IMG/IMG_AUX-LOG/3.png" alt="Slide 3">
                <figcaption>Proceso Operativo</figcaption>
            </figure>
            <figure class="ind-slide">
                <img src="IMG/IMG_AUX-LOG/4.png" alt="Slide 4">
                <figcaption>Toma de Decisiones</figcaption>
            </figure>
            <figure class="ind-slide">
                <img src="IMG/IMG_AUX-LOG/5.png" alt="Slide 5">
                <figcaption>Preparación de la Ruta</figcaption>
            </figure>
            <figure class="ind-slide">
                <img src="IMG/IMG_AUX-LOG/6.png" alt="Slide 6">
                <figcaption>Proceso de Entrega</figcaption>
            </figure>
            <figure class="ind-slide">
                <img src="IMG/IMG_AUX-LOG/7.png" alt="Slide 7">
                <figcaption>Manejo de Dinero y Consignaciones</figcaption>
            </figure>
            <figure class="ind-slide">
                <img src="IMG/IMG_AUX-LOG/8.png" alt="Slide 8">
                <figcaption>Cierre de Ruta y Cuadre</figcaption>
            </figure>
            <figure class="ind-slide">
                <img src="IMG/IMG_AUX-LOG/9.png" alt="Slide 9">
                <figcaption>Relaciones Interpersonales</figcaption>
            </figure>
        </div>

        <nav class="ind-carousel__controls">
            <button id="ind-prev" class="ind-btn-control">Anterior</button>
            <span id="ind-contador" class="ind-contador">1 / 9</span>
            <button id="ind-next" class="ind-btn-control">Siguiente</button>
        </nav>
    </section>

    <section class="ind-evaluacion">
        <button id="ind-btnEvaluacion" class="ind-btn-eval" disabled>
            Iniciar Evaluación →
        </button>
    </section>
</main>

<script src="controllers/aux_log.js"></script>
</body>
</html>
